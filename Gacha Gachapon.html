document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,130,0,.35), 0 8px 18px rgba(245,190,0,.4)\"><\u002Fdiv>\n        <div style=\"position:absolute;top:9px;right:14px;width:20px;height:13px;background:rgba(255,255,255,.9);border-radius:50%;transform:rotate(24deg)\"><\u002Fdiv>\n        <div style=\"position:absolute;top:30px;left:23px;width:7px;height:13px;background:#2A2620;border-radius:50%\"><\u002Fdiv>\n        <div style=\"position:absolute;top:30px;left:41px;width:7px;height:13px;background:#2A2620;border-radius:50%\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"position:relative;display:flex;gap:12px;margin-top:20px;width:100%;max-width:300px\">\n      <div onclick=\"{{ onClaim }}\" style-active=\"transform:scale(.96)\" style=\"flex:1;height:54px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:15px;cursor:pointer\">เก็บเข้าตู้<\u002Fdiv>\n      <div onclick=\"{{ onDrawAgain }}\" style-active=\"transform:scale(.96)\" style=\"flex:1.25;height:54px;border-radius:18px;background:linear-gradient(135deg,#FF9A5A,#FF5E3A);display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 12px 24px rgba(255,90,45,.4)\">{{ againLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:446,&quot;height&quot;:900},&quot;startingCoins&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:24,&quot;min&quot;:0,&quot;max&quot;:999,&quot;tsType&quot;:&quot;number&quot;},&quot;showMascot&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    phase: null,\n    coins: (this.props && this.props.startingCoins != null) ? this.props.startingCoins : 24,\n    invTab: 'all',\n    current: null,\n    inventory: [\n      { name: 'คูปองส่วนลด 20%', sub: 'Drely Sport', type: 'voucher', emoji: '🎟️', rarity: 'rare', date: '24 มิ.ย.' },\n      { name: 'สกินจี๊ดจ๊าด', sub: 'Character Skin', type: 'item', emoji: '🦊', rarity: 'epic', date: '22 มิ.ย.' },\n      { name: 'เหรียญ +50', sub: 'Coin Pack', type: 'coin', emoji: '🪙', rarity: 'common', date: '21 มิ.ย.' },\n      { name: 'สติกเกอร์เซ็ต', sub: 'In-game Sticker', type: 'item', emoji: '🌈', rarity: 'common', date: '20 มิ.ย.' },\n      { name: 'กาแฟฟรี 1 แก้ว', sub: 'Cafe Voucher', type: 'voucher', emoji: '☕', rarity: 'rare', date: '18 มิ.ย.' },\n      { name: 'เสื้อลิมิเต็ด', sub: 'Limited Tee', type: 'merch', emoji: '👕', rarity: 'epic', date: '15 มิ.ย.' },\n    ],\n  };\n\n  RARITY = {\n    common:    { eng: 'COMMON',    label: 'ทั่วไป', color: '#8DA0B5', soft: '#EEF2F6', grad: 'linear-gradient(135deg,#AEB9C7,#8DA0B5)' },\n    rare:      { eng: 'RARE',      label: 'หายาก', color: '#3E8BF0', soft: '#E9F1FE', grad: 'linear-gradient(135deg,#5AA0FF,#3E8BF0)' },\n    epic:      { eng: 'EPIC',      label: 'อิพิค', color: '#9A5BE6', soft: '#F1E9FE', grad: 'linear-gradient(135deg,#B27BFF,#9A5BE6)' },\n    legendary: { eng: 'LEGENDARY', label: 'ตำนาน', color: '#FF9E2C', soft: '#FFF1DA', grad: 'linear-gradient(135deg,#FFC24B,#FF7A2E)' },\n  };\n\n  POOL = [\n    { name: 'เหรียญ +50', sub: 'Coin Pack', type: 'coin', emoji: '🪙', rarity: 'common' },\n    { name: 'สติกเกอร์เซ็ต', sub: 'In-game Sticker', type: 'item', emoji: '🌈', rarity: 'common' },\n    { name: 'ธีมโปรไฟล์', sub: 'Profile Theme', type: 'item', emoji: '🎨', rarity: 'common' },\n    { name: 'คูปองส่วนลด 20%', sub: 'Drely Sport', type: 'voucher', emoji: '🎟️', rarity: 'rare' },\n    { name: 'กาแฟฟรี 1 แก้ว', sub: 'Cafe Voucher', type: 'voucher', emoji: '☕', rarity: 'rare' },\n    { name: 'สกินจี๊ดจ๊าด', sub: 'Character Skin', type: 'item', emoji: '🦊', rarity: 'rare' },\n    { name: 'เอฟเฟกต์วิ่งพิเศษ', sub: 'Run Trail FX', type: 'item', emoji: '⚡', rarity: 'epic' },\n    { name: 'เสื้อลิมิเต็ด', sub: 'Limited Tee', type: 'merch', emoji: '👕', rarity: 'epic' },\n    { name: 'มงกุฎทองคำ', sub: 'Legendary Skin', type: 'item', emoji: '👑', rarity: 'legendary' },\n    { name: 'รองเท้ารุ่นพิเศษ', sub: 'Sneaker Drop', type: 'merch', emoji: '👟', rarity: 'legendary' },\n  ];\n\n  PACKAGES = [\n    { coins: 10,  price: '฿35',  bonus: 0 },\n    { coins: 55,  price: '฿159', bonus: 5 },\n    { coins: 140, price: '฿349', bonus: 20, hot: true },\n    { coins: 360, price: '฿790', bonus: 60, best: true },\n  ];\n\n  componentWillUnmount() { clearTimeout(this._t); }\n\n  decorate(p) {\n    const r = this.RARITY[p.rarity];\n    return Object.assign({}, p, { rLabel: r.label, rColor: r.color, rSoft: r.soft, rGrad: r.grad, rEng: r.eng });\n  }\n\n  pickPrize() {\n    const x = Math.random() * 100;\n    let tier = 'common';\n    if (x >= 94) tier = 'legendary';\n    else if (x >= 80) tier = 'epic';\n    else if (x >= 50) tier = 'rare';\n    const opts = this.POOL.filter(p => p.rarity === tier);\n    return this.decorate(opts[Math.floor(Math.random() * opts.length)]);\n  }\n\n  _startDraw() {\n    if (this.state.phase === 'drawing') return;\n    if (this.state.coins <= 0) { this.goShop(); return; }\n    const prize = this.pickPrize();\n    const cols = ['#FF8A5C', '#FFC24B', '#FF6A45', '#FFFFFF', '#FFD98A', prize.rColor];\n    const conf = [];\n    for (let i = 0; i < 30; i++) {\n      conf.push({\n        left: Math.round(Math.random() * 100) + '%',\n        size: (6 + Math.round(Math.random() * 8)) + 'px',\n        color: cols[i % cols.length],\n        delay: (Math.random() * 0.5).toFixed(2) + 's',\n        dur: (1.5 + Math.random() * 1.2).toFixed(2) + 's',\n        round: Math.random() > 0.5 ? '50%' : '2px',\n      });\n    }\n    this.setState({ coins: this.state.coins - 1, current: prize, phase: 'drawing', confetti: conf });\n    const d = (this.props && this.props.reduceMotion) ? 450 : 1900;\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ phase: 'result' }), d);\n  }\n\n  _claim() {\n    const c = this.state.current;\n    if (!c) return;\n    const item = Object.assign({}, c, { date: '26 มิ.ย.' });\n    this.setState(st => ({ inventory: [item, ...st.inventory] }));\n  }\n\n  onClaim = () => { this._claim(); this.setState({ phase: null, current: null }); };\n\n  onDrawAgain = () => {\n    this._claim();\n    if (this.state.coins > 0) { this.setState({ phase: null, current: null }); this._startDraw(); }\n    else { this.setState({ phase: null, current: null, screen: 'shop' }); }\n  };\n\n  buy(pk) { this.setState(st => ({ coins: st.coins + pk.coins + pk.bonus })); }\n\n  goHome = () => this.setState({ screen: 'home', phase: null, current: null });\n  goCollection = () => this.setState({ screen: 'collection', phase: null, current: null });\n  goShop = () => this.setState({ screen: 'shop', phase: null, current: null });\n\n  makeConfetti() {\n    const base = ['#FF8A5C', '#FFC24B', '#FF6A45', '#FFFFFF', '#FFD98A'];\n    const cur = this.state.current ? this.state.current.rColor : '#FF8A5C';\n    const colors = base.concat([cur, cur]);\n    const arr = [];\n    for (let i = 0; i < 32; i++) {\n      const left = Math.random() * 100;\n      const size = 6 + Math.random() * 8;\n      const delay = Math.random() * 0.5;\n      const dur = 1.5 + Math.random() * 1.3;\n      const color = colors[i % colors.length];\n      const round = Math.random() > 0.5 ? '50%' : '2px';\n      arr.push(React.createElement('div', {\n        key: i,\n        style: {\n          position: 'absolute', top: '-20px', left: left + '%',\n          width: size + 'px', height: size + 'px', background: color,\n          borderRadius: round, opacity: 0,\n          animation: 'confettiFall ' + dur + 's ' + delay + 's ease-in forwards',\n        },\n      }));\n    }\n    return arr;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const p = this.props || {};\n    const phase = s.phase;\n    const base = !phase;\n    const screen = s.screen;\n    const titles = { home: 'กาชาปอง', collection: 'ตู้เก็บของรางวัล', shop: 'เติมเหรียญ' };\n    const showMascot = p.showMascot !== false;\n\n    const odds = [\n      { pct: '50%', label: 'ทั่วไป', color: '#8DA0B5' },\n      { pct: '30%', label: 'หายาก', color: '#3E8BF0' },\n      { pct: '14%', label: 'อิพิค', color: '#9A5BE6' },\n      { pct: '6%',  label: 'ตำนาน', color: '#FF9E2C' },\n    ];\n\n    const tabDefs = [['all', 'ทั้งหมด'], ['item', 'ไอเทม'], ['voucher', 'คูปอง'], ['merch', 'ของจริง']];\n    const tabs = tabDefs.map(([id, label]) => {\n      const active = s.invTab === id;\n      return {\n        id, label, active,\n        bg: active ? 'linear-gradient(135deg,#FF9A5A,#FF5E3A)' : '#FFFFFF',\n        color: active ? '#FFFFFF' : '#9a8a7a',\n        shadow: active ? '0 8px 18px rgba(255,90,45,.30)' : '0 3px 10px rgba(80,50,30,.06)',\n        select: () => this.setState({ invTab: id }),\n      };\n    });\n\n    const inv = s.inventory.map(it => this.decorate(it));\n    const invFiltered = inv.filter(it => {\n      if (s.invTab === 'all') return true;\n      if (s.invTab === 'item') return it.type === 'item' || it.type === 'coin';\n      return it.type === s.invTab;\n    });\n\n    const packages = this.PACKAGES.map(pk => Object.assign({}, pk, {\n      buy: () => this.buy(pk),\n      bonusShow: pk.bonus > 0,\n      badge: pk.best ? 'คุ้มสุด' : (pk.hot ? 'ยอดนิยม' : null),\n      badgeColor: pk.best ? '#FF5E3A' : '#FF9E2C',\n    }));\n\n    const canDraw = s.coins > 0;\n\n    return {\n      coins: s.coins,\n      baseVisible: base,\n      isHome: base && screen === 'home',\n      isCollection: base && screen === 'collection',\n      isShop: base && screen === 'shop',\n      isDrawing: phase === 'drawing',\n      isResult: phase === 'result',\n      headerTitle: titles[screen],\n      showMascot,\n      odds, tabs, invFiltered, packages,\n      invCount: s.inventory.length,\n      emptyInv: invFiltered.length === 0,\n      notEmptyInv: invFiltered.length > 0,\n      current: s.current,\n      currentRarityUpper: s.current ? s.current.rEng : '',\n      confetti: s.confetti || [],\n      ctaLabel: canDraw ? 'สุ่มเลย' : 'เติมเหรียญก่อน',\n      againLabel: s.coins > 0 ? 'สุ่มอีกครั้ง' : 'เติมเหรียญ',\n      onCtaClick: () => canDraw ? this._startDraw() : this.goShop(),\n      onClaim: this.onClaim,\n      onDrawAgain: this.onDrawAgain,\n      goHome: this.goHome,\n      goCollection: this.goCollection,\n      goShop: this.goShop,\n      homeCol: screen === 'home' ? '#FF6A45' : '#BCAFA4',\n      colCol: screen === 'collection' ? '#FF6A45' : '#BCAFA4',\n      shopCol: screen === 'shop' ? '#FF6A45' : '#BCAFA4',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
